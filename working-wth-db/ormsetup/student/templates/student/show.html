<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Student Details</h1>
  {% if data %}
    <ul>
      {% for d in data %}
        <li>{{d.name}} - {{d.email}} - {{d.city}}</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No student data available.</p>

  {% endif %}
  <!-- <p>Total Students: {{data|length}}</p> -->
</body>
</html>
