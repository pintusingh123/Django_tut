 {% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/output.css' %}" />
    <title>{% block title %}My App{% endblock %}</title>
  </head>

  <body class="min-h-screen flex flex-col bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-blue-600 shadow-md">
      <div class="max-w-6xl mx-auto px-4">
        <ul class="flex items-center gap-6 h-16 text-white font-medium">
          <li>
            <a href="/sms/" class="hover:text-blue-200 transition">
              Base
            </a>
          </li>
          <li>
            <a href="/sms/home" class="hover:text-blue-200 transition">
              Home
            </a>
          </li>
          <li>
            <a href="/sms/about" class="hover:text-blue-200 transition">
              About
            </a>
          </li>
        </ul>
        <br>
         <ul class="flex items-center gap-6 h-16 text-white font-medium">
          <li>
            <a href="{% url 'base' %}" class="hover:text-blue-200 transition">
              Base
            </a>
          </li>
          <li>
            <a href="{% url 'home' %}" class="hover:text-blue-200 transition">
              Home
            </a>
          </li>
          <li>
            <a href="{% url 'about' %}" class="hover:text-blue-200 transition">
              About
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-6xl mx-auto w-full p-6">
      <div class="bg-white rounded-lg shadow-md p-6">
        {% block content %}
        {% endblock %}
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 mt-auto">
      <div class="max-w-6xl mx-auto px-6 py-4 text-center">
        <h3 class="font-semibold text-white mb-2">
          My Django Website
        </h3>
        <p class="text-sm">
          Built with Django and Tailwind CSS. This footer appears on every page
          using template inheritance.
        </p>
      </div>
    </footer>

  </body>
</html>
